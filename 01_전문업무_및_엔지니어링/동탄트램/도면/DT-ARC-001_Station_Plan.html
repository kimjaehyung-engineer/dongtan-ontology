<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DT-ARC-001: 동탄트램 표준 정거장 평면도 (곡선구간)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; }
        .blueprint { border: 2px solid #4a90e2; padding: 20px; background-color: #0f2027; text-align: center; }
        .warning { color: #ff4757; font-weight: bold; border: 1px dashed #ff4757; padding: 10px; margin-top: 20px;}
        .drawing-area { margin: 20px auto; width: 80%; height: 300px; background-image: repeating-linear-gradient(45deg, #1a2a3a 25%, transparent 25%, transparent 75%, #1a2a3a 75%, #1a2a3a), repeating-linear-gradient(45deg, #1a2a3a 25%, #0f2027 25%, #0f2027 75%, #1a2a3a 75%, #1a2a3a); background-position: 0 0, 10px 10px; background-size: 20px 20px; position: relative; border: 1px solid #4a90e2;}
        .tram { position: absolute; top: 120px; left: 10%; width: 400px; height: 60px; background-color: rgba(255, 255, 255, 0.8); color: #000; line-height: 60px; transform: rotate(5deg); }
        .psd { position: absolute; top: 100px; left: 10%; width: 400px; height: 10px; background-color: #2ed573; }
        .gap { position: absolute; top: 110px; left: 45%; color: #ff4757; font-weight: bold; font-size: 14px;}
    </style>
</head>
<body>
    <h1>[지식망 연동 도면 뷰어]</h1>
    <div class="blueprint">
        <h2>도면번호: DT-ARC-001 | 정거장 평면도 (차량-PSD 간섭 검토도)</h2>
        <div class="drawing-area">
            <div class="psd">정거장 플랫폼 (PSD 설치선)</div>
            <div class="tram">동탄트램 차량 (동적 포락선 반영)</div>
            <div class="gap">← Swing Out 간섭 위험 (Gap > 25cm) →</div>
        </div>
        <div class="warning">
            ⚠ [RISK ALARM] RFP 제3장 2절: 곡선 반경 진입 시 차량 편심(Swing Out)으로 인한 PSD 간섭 리스크 감지됨.<br>
            * 해결 방안: 가상정차 3D 시뮬레이션 기반 PSD 위치 15cm 후퇴 시공 요망.
        </div>
    </div>
</body>
</html>
